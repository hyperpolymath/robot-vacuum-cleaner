# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: PMPL-1.0-or-later

[project]
name = "docker"

[[functions]]
name = "move_by"
source = "src/rust/src/robot.rs"
energy-budget-mj = 5.0
carbon-budget-mg = 1.0

[[functions]]
name = "should_return_to_dock"
source = "src/rust/src/robot.rs"
energy-budget-mj = 2.0
carbon-budget-mg = 0.5

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
